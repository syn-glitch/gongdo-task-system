name: "🕵️ 김감사 QA — 이슈 자동 분석"

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  actions: write

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    # from-workspace 라벨이 있는 이슈만 실행
    if: contains(toJSON(github.event.issue.labels.*.name), 'from-workspace')

    steps:
      # 0. 중복 실행 방지 — qa-reviewed 라벨이 이미 있으면 스킵
      - name: Check if already reviewed
        id: check_reviewed
        run: |
          if echo '${{ toJSON(github.event.issue.labels.*.name) }}' | grep -q 'qa-reviewed'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # 1. analyzing 라벨 부착 (분석 중 표시)
      - name: Add analyzing label
        if: steps.check_reviewed.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'analyzing'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'analyzing',
                color: 'fbca04',
                description: '김감사 QA 분석 중'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['analyzing']
            });

      # 2. 리포 체크아웃 (프롬프트 파일 읽기용)
      - name: Checkout repo
        if: steps.check_reviewed.outputs.skip == 'false'
        uses: actions/checkout@v4

      # 3. 일일 실행 횟수 제한 (최대 20건/일)
      - name: Check daily limit
        if: steps.check_reviewed.outputs.skip == 'false'
        id: rate_limit
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'kim-qa-issue-analysis.yml',
              created: `>=${today}`,
              per_page: 25
            });
            const count = runs.total_count || 0;
            console.log(`Today's run count: ${count}`);
            if (count > 20) {
              core.setOutput('exceeded', 'true');
              core.warning('Daily limit exceeded (20 runs/day)');
            } else {
              core.setOutput('exceeded', 'false');
            }

      # 4. 토큰 사용량 및 비용 사전 예측 (Bunker Team / Phase 2)
      - name: Estimate Token Cost (Pre-Flight)
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        id: estimator
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TARGET_STAGES: "issue-analysis,issue-response,auto-fix"
        run: |
          python3 .github/scripts/estimator.py

      # 5. [게이트 평가] 고비용 시 자동 중단 및 슬랙 대기 (JARVIS-SPEC-2026-03-11)
      - name: Cost Gate Check
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        id: cost_gate
        run: |
          ACTION="${{ steps.estimator.outputs.action }}"
          if [ "$ACTION" == "WAIT_APPROVAL" ]; then
            echo "⛔ 비용이 $0.1 이상(대규모 작업)으로 예상되어 승인 게이트에서 일시 정지(중단)합니다."
            echo "continue_analysis=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 비용 승인 조건 충족 ($ACTION). 분석을 시작합니다."
            echo "continue_analysis=true" >> $GITHUB_OUTPUT
          fi

      # 6. Claude API로 이슈 분석 [CI-01 수정: 환경변수로 안전하게 전달]
      - name: Analyze issue with Claude
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.cost_gate.outputs.continue_analysis == 'true'
        id: claude_analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # python3 스크립트로 안전하게 JSON 생성 + API 호출 + 응답 파싱
          python3 << 'PYTHON_SCRIPT'
          import os, json, urllib.request, urllib.error

          # 환경변수에서 안전하게 읽기
          api_key = os.environ["ANTHROPIC_API_KEY"]
          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_body = os.environ.get("ISSUE_BODY", "")
          issue_labels = os.environ.get("ISSUE_LABELS", "")
          issue_number = os.environ.get("ISSUE_NUMBER", "")

          # 시스템 프롬프트 읽기
          with open(".github/prompts/issue_triage_prompt.md", "r") as f:
              system_prompt = f.read()

          # 유저 메시지 조합
          user_msg = f"""다음 GitHub Issue를 분석해주세요.

          이슈 번호: #{issue_number}
          제목: {issue_title}
          라벨: {issue_labels}

          본문:
          {issue_body}"""

          # API 요청 페이로드
          payload = json.dumps({
              "model": "claude-sonnet-4-5-20250929",
              "max_tokens": 2000,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_msg}]
          }).encode("utf-8")

          # API 호출
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01"
              }
          )

          analysis = ""
          success = False
          input_tokens = 0
          output_tokens = 0
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
                  if "content" in data and len(data["content"]) > 0:
                      analysis = data["content"][0]["text"]
                      success = True
                  else:
                      analysis = f"[분석 실패] 응답에 content 없음: {json.dumps(data, ensure_ascii=False)[:200]}"
                  usage = data.get("usage", {})
                  input_tokens = usage.get("input_tokens", 0)
                  output_tokens = usage.get("output_tokens", 0)
          except urllib.error.HTTPError as e:
              error_body = e.read().decode("utf-8")
              print(f"API HTTP {e.code}: {error_body[:500]}")
              try:
                  err_data = json.loads(error_body)
                  err_msg = err_data.get("error", {}).get("message", error_body[:200])
                  analysis = f"[분석 실패] API 에러 ({e.code}): {err_msg}"
              except Exception:
                  analysis = f"[분석 실패] HTTP {e.code}: {error_body[:200]}"
          except Exception as e:
              analysis = f"[분석 실패] {type(e).__name__}: {str(e)}"

          # 비용 계산 (Sonnet: $3/MTok input, $15/MTok output)
          cost_usd = (input_tokens * 3 / 1_000_000) + (output_tokens * 15 / 1_000_000)
          token_summary = f"{input_tokens:,} in + {output_tokens:,} out = ${cost_usd:.4f}"
          print(f"토큰: {token_summary}")

          # GITHUB_OUTPUT에 저장
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("analysis<<ANALYSIS_EOF\n")
              f.write(analysis + "\n")
              f.write("ANALYSIS_EOF\n")
              f.write(f"success={str(success).lower()}\n")
              f.write(f"input_tokens={input_tokens}\n")
              f.write(f"output_tokens={output_tokens}\n")
              f.write(f"cost_usd={cost_usd:.4f}\n")
          PYTHON_SCRIPT

      # 7. GitHub Issue에 QA 보고서 코멘트 추가
      - name: Post QA report as comment
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.cost_gate.outputs.continue_analysis == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = process.env.ANALYSIS_RESULT;
            const body = `${analysis}\n\n---\n*🤖 김감사 QA팀 자동 분석 (Claude AI) | [워크플로우 로그](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        env:
          ANALYSIS_RESULT: ${{ steps.claude_analysis.outputs.analysis }}

      # 8. 라벨 교체 [CI-03 수정: 분석 실패 시 qa-failed 라벨]
      - name: Update labels on success
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.cost_gate.outputs.continue_analysis == 'true' && steps.claude_analysis.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-reviewed'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-reviewed',
                color: '7057ff',
                description: '김감사 QA 분석 완료'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['qa-reviewed']
            });

      - name: Update labels on failure
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.cost_gate.outputs.continue_analysis == 'true' && steps.claude_analysis.outputs.success != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-failed'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-failed',
                color: 'd73a4a',
                description: '김감사 QA 자동 분석 실패'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['qa-failed']
            });

      # 9. 슬랙 DM 발송 (Block Kit 버튼 — Pre-Flight / 팀 배정 혼합)
      - name: Send Slack DM to CEO
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CEO_ID: "U02S3CN9E6R"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          # 기존 (분석 후 결과)
          ANALYSIS_SUCCESS: ${{ steps.claude_analysis.outputs.success }}
          COST_USD: ${{ steps.claude_analysis.outputs.cost_usd }}
          INPUT_TOKENS: ${{ steps.claude_analysis.outputs.input_tokens }}
          OUTPUT_TOKENS: ${{ steps.claude_analysis.outputs.output_tokens }}
          # 신규 (Pre-Flight 예측 결과)
          GATE_CONTINUED: ${{ steps.cost_gate.outputs.continue_analysis }}
          EST_COST: ${{ steps.estimator.outputs.est_cost_usd }}
          EST_INFO: "Est: In ${{ steps.estimator.outputs.est_input_tokens }} / Out ${{ steps.estimator.outputs.est_output_tokens }}"
          EST_EFFICIENCY: ${{ steps.estimator.outputs.efficiency }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os, json, urllib.request

          slack_token = os.environ["SLACK_TOKEN"]
          ceo_id = os.environ["SLACK_CEO_ID"]
          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title = os.environ["ISSUE_TITLE"]
          issue_url = os.environ["ISSUE_URL"]
          labels = os.environ["ISSUE_LABELS"]
          
          # 게이트 통과 여부에 따라 분기
          gate_continued = os.environ.get("GATE_CONTINUED", "true") == "true"
          
          if not gate_continued:
              # [Pre-Flight] 승인 대기 상태
              est_cost = float(os.environ.get("EST_COST", "0"))
              cost_krw = int(est_cost * 1400)
              est_eff = os.environ.get("EST_EFFICIENCY", "N/A")
              
              fallback_text = f"💡 [승인대기] 이슈 #{issue_number}: 파이프라인 예측 비용 초과 (${est_cost:.2f})"
              status_text = "⚠️ 비용 초과 대기 (승인 시 깃허브 액션 재개)"
              
              blocks = [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"━━━━━━━━━━━━━━━━━━━━\n"
                              f"💡 *[PRE-FLIGHT] 작업 비용 예측 (대기)*\n"
                              f"━━━━━━━━━━━━━━━━━━━━\n"
                              f"🔢 이슈 #{issue_number}: {issue_title}\n"
                              f"💰 예상 비용(전체): *${est_cost:.4f}* (약 ₩{cost_krw:,})\n"
                              f"🚀 효율성: [{est_eff}]\n\n"
                              f"🔗 <{issue_url}|이슈 보기>"
                          )
                      }
                  },
                  {
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "✅ 조건부 승인 (분석 강제 재개)"},
                              "style": "primary",
                              "action_id": "resume_auto_analysis",
                              "value": f"{issue_number}"
                          },
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "❌ 이번 작업 취소"},
                              "style": "danger",
                              "action_id": "cancel_auto_analysis",
                              "value": f"{issue_number}"
                          }
                      ]
                  }
              ]
          else:
              # 기존: [분석 완료] 결과 보고
              success = os.environ.get("ANALYSIS_SUCCESS", "false") == "true"
              cost_usd = os.environ.get("COST_USD", "0")
              input_tokens = os.environ.get("INPUT_TOKENS", "0")
              output_tokens = os.environ.get("OUTPUT_TOKENS", "0")

              cost_val = float(cost_usd) if cost_usd else 0
              cost_krw = int(cost_val * 1400)

              if success:
                  status = "✅ 분석 완료"
              else:
                  status = "⚠️ 분석 실패 (수동 검토 필요)"

              fallback_text = (
                  f"🕵️ 김감사 QA 자동 분석 | "
                  f"이슈 #{issue_number}: {issue_title} | "
                  f"상태: {status}"
              )

              blocks = [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"━━━━━━━━━━━━━━━━━━━━\n"
                              f"🕵️ *김감사 QA 자동 분석*\n"
                              f"━━━━━━━━━━━━━━━━━━━━\n"
                              f"🔢 이슈 #{issue_number}: {issue_title}\n"
                              f"🏷️ 라벨: {labels}\n"
                              f"📋 상태: {status}\n"
                              f"💰 실소모: {input_tokens} in + {output_tokens} out | *${cost_val:.4f}* (₩{cost_krw:,})\n\n"
                              f"🔗 <{issue_url}|보고서 확인>"
                          )
                      }
                  }
              ]

              if success:
                  blocks.append({
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": "📋 *이슈 처리 담당팀을 선택해주세요:*"
                      }
                  })
                  blocks.append({
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "🤵 자비스 개발팀"},
                              "style": "primary",
                              "action_id": "assign_team_jarvis",
                              "value": f"{issue_number}"
                          },
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "🔧 강철 AX팀"},
                              "action_id": "assign_team_gangcheol",
                              "value": f"{issue_number}"
                          }
                      ]
                  })
          # Slack API 전송
          payload = json.dumps({
              "channel": ceo_id,
              "text": fallback_text,
              "blocks": blocks
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=payload,
              headers={
                  "Authorization": f"Bearer {slack_token}",
                  "Content-Type": "application/json"
              }
          )
          try:
              resp = urllib.request.urlopen(req)
              result = json.loads(resp.read().decode("utf-8"))
              if not result.get("ok"):
                  print(f"Slack API 에러: {result.get('error', 'unknown')}")
          except Exception as e:
              print(f"Slack DM 발송 실패: {e}")
          PYTHON_SCRIPT

      # 10. 자비스 이해보고서 워크플로우 자동 호출
      - name: Trigger Jarvis workflow
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.cost_gate.outputs.continue_analysis == 'true' && steps.claude_analysis.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'jarvis-issue-response.yml',
              ref: 'main',
              inputs: {
                issue_number: String(context.issue.number)
              }
            });
            console.log(`Triggered jarvis workflow for issue #${context.issue.number}`);

      # 11. 일일 한도 초과 시 라벨 정리
      - name: Clean up on rate limit
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ 김감사 QA 자동 분석 일일 한도(20건) 초과. 수동 검토가 필요합니다.'
            });

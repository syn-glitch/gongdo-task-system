name: "🕵️ 김감사 QA — 이슈 자동 분석"

on:
  issues:
    types: [opened]

permissions:
  issues: write
  actions: write

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    # from-workspace 라벨이 있는 이슈만 실행
    if: contains(toJSON(github.event.issue.labels.*.name), 'from-workspace')

    steps:
      # 0. 중복 실행 방지 — qa-reviewed 라벨이 이미 있으면 스킵
      - name: Check if already reviewed
        id: check_reviewed
        run: |
          if echo '${{ toJSON(github.event.issue.labels.*.name) }}' | grep -q 'qa-reviewed'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # 1. analyzing 라벨 부착 (분석 중 표시)
      - name: Add analyzing label
        if: steps.check_reviewed.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'analyzing'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'analyzing',
                color: 'fbca04',
                description: '김감사 QA 분석 중'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['analyzing']
            });

      # 2. 리포 체크아웃 (프롬프트 파일 읽기용)
      - name: Checkout repo
        if: steps.check_reviewed.outputs.skip == 'false'
        uses: actions/checkout@v4

      # 3. 일일 실행 횟수 제한 (최대 20건/일)
      - name: Check daily limit
        if: steps.check_reviewed.outputs.skip == 'false'
        id: rate_limit
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'kim-qa-issue-analysis.yml',
              created: `>=${today}`,
              per_page: 25
            });
            const count = runs.total_count || 0;
            console.log(`Today's run count: ${count}`);
            if (count > 20) {
              core.setOutput('exceeded', 'true');
              core.warning('Daily limit exceeded (20 runs/day)');
            } else {
              core.setOutput('exceeded', 'false');
            }

      # 4. Claude API로 이슈 분석 [CI-01 수정: 환경변수로 안전하게 전달]
      - name: Analyze issue with Claude
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        id: claude_analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # python3 스크립트로 안전하게 JSON 생성 + API 호출 + 응답 파싱
          python3 << 'PYTHON_SCRIPT'
          import os, json, urllib.request, urllib.error

          # 환경변수에서 안전하게 읽기
          api_key = os.environ["ANTHROPIC_API_KEY"]
          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_body = os.environ.get("ISSUE_BODY", "")
          issue_labels = os.environ.get("ISSUE_LABELS", "")
          issue_number = os.environ.get("ISSUE_NUMBER", "")

          # 시스템 프롬프트 읽기
          with open(".github/prompts/issue_triage_prompt.md", "r") as f:
              system_prompt = f.read()

          # 유저 메시지 조합
          user_msg = f"""다음 GitHub Issue를 분석해주세요.

          이슈 번호: #{issue_number}
          제목: {issue_title}
          라벨: {issue_labels}

          본문:
          {issue_body}"""

          # API 요청 페이로드
          payload = json.dumps({
              "model": "claude-sonnet-4-5-20250929",
              "max_tokens": 2000,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_msg}]
          }).encode("utf-8")

          # API 호출
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "content-type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01"
              }
          )

          analysis = ""
          success = False
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
                  if "content" in data and len(data["content"]) > 0:
                      analysis = data["content"][0]["text"]
                      success = True
                  else:
                      analysis = f"[분석 실패] 응답에 content 없음: {json.dumps(data, ensure_ascii=False)[:200]}"
          except urllib.error.HTTPError as e:
              error_body = e.read().decode("utf-8")
              try:
                  err_data = json.loads(error_body)
                  err_msg = err_data.get("error", {}).get("message", error_body[:200])
                  analysis = f"[분석 실패] API 에러 ({e.code}): {err_msg}"
              except Exception:
                  analysis = f"[분석 실패] HTTP {e.code}: {error_body[:200]}"
          except Exception as e:
              analysis = f"[분석 실패] {type(e).__name__}: {str(e)}"

          # GITHUB_OUTPUT에 저장
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("analysis<<ANALYSIS_EOF\n")
              f.write(analysis + "\n")
              f.write("ANALYSIS_EOF\n")
              f.write(f"success={str(success).lower()}\n")
          PYTHON_SCRIPT

      # 5. GitHub Issue에 QA 보고서 코멘트 추가
      - name: Post QA report as comment
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = process.env.ANALYSIS_RESULT;
            const body = `${analysis}\n\n---\n*🤖 김감사 QA팀 자동 분석 (Claude AI) | [워크플로우 로그](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        env:
          ANALYSIS_RESULT: ${{ steps.claude_analysis.outputs.analysis }}

      # 6. 라벨 교체 [CI-03 수정: 분석 실패 시 qa-failed 라벨]
      - name: Update labels on success
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.claude_analysis.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-reviewed'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-reviewed',
                color: '7057ff',
                description: '김감사 QA 분석 완료'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['qa-reviewed']
            });

      - name: Update labels on failure
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.claude_analysis.outputs.success != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-failed'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'qa-failed',
                color: 'd73a4a',
                description: '김감사 QA 자동 분석 실패'
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['qa-failed']
            });

      # 7. 슬랙 DM 발송 (Block Kit 버튼 — 팀 배정 선택)
      - name: Send Slack DM to CEO
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CEO_ID: "U02S3CN9E6R"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ANALYSIS_SUCCESS: ${{ steps.claude_analysis.outputs.success }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os, json, urllib.request

          slack_token = os.environ["SLACK_TOKEN"]
          ceo_id = os.environ["SLACK_CEO_ID"]
          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title = os.environ["ISSUE_TITLE"]
          issue_url = os.environ["ISSUE_URL"]
          labels = os.environ["ISSUE_LABELS"]
          success = os.environ.get("ANALYSIS_SUCCESS", "false") == "true"

          if success:
              status = "✅ 분석 완료"
          else:
              status = "⚠️ 분석 실패 (수동 검토 필요)"

          fallback_text = (
              f"🕵️ 김감사 QA 자동 분석 | "
              f"이슈 #{issue_number}: {issue_title} | "
              f"상태: {status}"
          )

          blocks = [
              {
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": (
                          f"━━━━━━━━━━━━━━━━━━━━\n"
                          f"🕵️ *김감사 QA 자동 분석*\n"
                          f"━━━━━━━━━━━━━━━━━━━━\n"
                          f"🔢 이슈 #{issue_number}: {issue_title}\n"
                          f"🏷️ 라벨: {labels}\n"
                          f"📋 상태: {status}\n\n"
                          f"🔗 <{issue_url}|보고서 확인>"
                      )
                  }
              }
          ]

          # 분석 성공 시 팀 배정 버튼 추가
          if success:
              blocks.append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": "📋 *이슈 처리 담당팀을 선택해주세요:*"
                  }
              })
              blocks.append({
                  "type": "actions",
                  "elements": [
                      {
                          "type": "button",
                          "text": {"type": "plain_text", "text": "🤵 자비스 개발팀"},
                          "style": "primary",
                          "action_id": "assign_team_jarvis",
                          "value": f"{issue_number}"
                      },
                      {
                          "type": "button",
                          "text": {"type": "plain_text", "text": "🔧 강철 AX팀"},
                          "action_id": "assign_team_gangcheol",
                          "value": f"{issue_number}"
                      }
                  ]
              })

          payload = json.dumps({
              "channel": ceo_id,
              "text": fallback_text,
              "blocks": blocks
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=payload,
              headers={
                  "Authorization": f"Bearer {slack_token}",
                  "Content-Type": "application/json"
              }
          )
          try:
              resp = urllib.request.urlopen(req)
              result = json.loads(resp.read().decode("utf-8"))
              if not result.get("ok"):
                  print(f"Slack API 에러: {result.get('error', 'unknown')}")
          except Exception as e:
              print(f"Slack DM 발송 실패: {e}")
          PYTHON_SCRIPT

      # 8. 자비스 이해보고서 워크플로우 자동 호출
      - name: Trigger Jarvis workflow
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'false' && steps.claude_analysis.outputs.success == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'jarvis-issue-response.yml',
              ref: 'main',
              inputs: {
                issue_number: String(context.issue.number)
              }
            });
            console.log(`Triggered jarvis workflow for issue #${context.issue.number}`);

      # 9. 일일 한도 초과 시 라벨 정리
      - name: Clean up on rate limit
        if: steps.check_reviewed.outputs.skip == 'false' && steps.rate_limit.outputs.exceeded == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'analyzing'
              });
            } catch (e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ 김감사 QA 자동 분석 일일 한도(20건) 초과. 수동 검토가 필요합니다.'
            });
